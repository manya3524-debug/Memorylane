<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memorylane</title>
<style>
body{font-family:Trebuchet MS,sans-serif;background:linear-gradient(#ffe6ee,#fff7f1,#ffeaf3);margin:0;color:#5b3545}
.screen{display:none;min-height:100vh;padding:20px}
.screen.active{display:block}
.box{max-width:450px;margin:30px auto;background:#fff;padding:25px;border-radius:28px;box-shadow:0 10px 30px rgba(0,0,0,.1);text-align:center}
.card{background:#fff0f6;border:2px solid #ffc5d7;padding:18px;border-radius:18px;margin:12px 0;font-weight:bold;cursor:pointer}
.photo{width:100%;border-radius:12px}
.note{background:#fff7fa;padding:16px;border-radius:16px;margin-top:12px}
button{background:#ff7fa8;color:#fff;border:none;padding:12px 22px;border-radius:24px;margin-top:12px}
</style>
</head>
<body>
<div id="home" class="screen active">
<div class="box">
<h1>🧸 Memorylane</h1>
<div class="card" onclick="openMemory('safe')">🤍 My Safe Place</div>
<div class="card" onclick="openMemory('silence')">😂 Us In Silence</div>
<div class="card" onclick="openMemory('jam')">🎶 Jamming Session</div>
<div class="card" onclick="openMemory('compliment')">🤍 Favorite Compliment</div>
</div></div>

<div id="safe" class="screen"><div class="box"><h2>🤍 My Safe Place</h2><img src="IMG-20260621-WA0004.jpg" class="photo"><div class="note">My safe place ♡</div><button onclick="goHome()">Back</button></div></div>
<div id="silence" class="screen"><div class="box"><h2>😂 Us In Silence</h2><img src="IMG-20260621-WA0014.jpg" class="photo"><div class="note">Us in silence ♡</div><button onclick="goHome()">Back</button></div></div>
<div id="jam" class="screen"><div class="box"><h2>🎶 Jamming Session</h2><img src="IMG-20260621-WA0015.jpg" class="photo"><div class="note">Jamming session ♡</div><button onclick="goHome()">Back</button></div></div>
<div id="compliment" class="screen"><div class="box"><h2>🤍 Favorite Compliment</h2><img src="IMG-20260621-WA0012.jpg" class="photo"><div class="note">Favorite compliment ♡</div><button onclick="goHome()">Back</button></div></div>

<script>
function openMemory(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goHome(){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('home').classList.add('active');}
</script>
</body></html>
